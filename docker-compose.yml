services:
  mongo:
    image: mongo:7
    container_name: beastcord-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beastcord-bot
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      MAIN_GUILD_ID: ${MAIN_GUILD_ID}
      OWNER_ID: ${OWNER_ID:-0}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/beastcord}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-beastcord}
      TESTING: ${TESTING:-false}

volumes:
  mongo_data:

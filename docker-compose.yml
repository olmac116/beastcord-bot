services:
  mongo:
    image: mongo:7
    container_name: beastbot-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beastbot-bot
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/beastbot}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-beastbot}
      BOT_PREFIX: ${BOT_PREFIX:-!}
    volumes:
      - ./:/app

volumes:
  mongo_data:
